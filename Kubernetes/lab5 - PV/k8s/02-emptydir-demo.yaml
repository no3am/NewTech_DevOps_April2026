# emptyDir demo: two containers in one Pod sharing a single volume.
#
# Key properties of emptyDir:
#   - Created fresh when the Pod is scheduled onto a node
#   - Shared between ALL containers in the Pod
#   - Survives individual container restarts (e.g. OOMKill)
#   - Deleted permanently when the Pod is removed from the node for any reason
#
# This is NOT persistent storage. Use it for: sidecar log sharing, cache, scratch space.
apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
  namespace: lab5-storage
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Writer started at $(date)" > /shared/log.txt
          while true; do
            echo "Appended at: $(date)" >> /shared/log.txt
            sleep 3
          done
      volumeMounts:
        - name: shared-data
          mountPath: /shared

    - name: reader
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            echo "=== Reader check at $(date) ==="
            cat /shared/log.txt 2>/dev/null || echo "(file not yet available)"
            echo ""
            sleep 5
          done
      volumeMounts:
        - name: shared-data      # Same volume name — both containers get the same directory
          mountPath: /shared

  volumes:
    - name: shared-data
      emptyDir: {}               # {} = use node's default storage medium (disk)
                                 # emptyDir.medium: Memory would use tmpfs (RAM-backed)

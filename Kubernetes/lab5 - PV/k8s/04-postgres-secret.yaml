# Secret: stores sensitive configuration outside of application manifests.
#
# Why use a Secret instead of plain env vars in the Deployment?
#   1. Keeps credentials out of version-controlled YAML files
#   2. Kubernetes stores Secrets base64-encoded and can encrypt them at rest
#   3. You can update credentials without redeploying the application
#   4. RBAC can restrict which Pods and ServiceAccounts can access Secrets
#
# stringData: lets you write plaintext values here — Kubernetes base64-encodes
# them internally. This is more readable than writing base64 yourself.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: lab5-storage
type: Opaque
stringData:
  POSTGRES_USER: labuser
  POSTGRES_PASSWORD: "L@bP@ss2024!"
  POSTGRES_DB: labdb

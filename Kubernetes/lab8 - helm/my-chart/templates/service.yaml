apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      # targetPort references the named port "http" on the container (deployment.yaml).
      # Using a name instead of a number means you can change the containerPort
      # in the Deployment without updating the Service.
      targetPort: http
      protocol: TCP
  selector:
    # Must match the selectorLabels in the Deployment's pod template.
    {{- include "my-chart.selectorLabels" . | nindent 4 }}

# Secret: Sensitive data (classified!). Stored base64-encoded in etcd.
# Use Secrets for passwords, API keys, access codes.
# Note: "MDA3" is the base64 encoding of the string "007" (decode it: echo MDA3 | base64 -d)
apiVersion: v1
kind: Secret
metadata:
  name: spy-secret
  labels:
    app: top-secret-dashboard
type: Opaque
data:
  # Base64-encoded value. "007" -> "MDA3"
  code: MDA3

# ---
# Service-A (Gateway), Service-B (Logic), Service-C (Database)
# Each Deployment overrides CMD to run the correct service_*.py
# ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: chain-reaction
  labels:
    app: service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: chain-reaction-app:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "service_a.py"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
  namespace: chain-reaction
  labels:
    app: service-a
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: service-a

# ---
# Mimir: long-term metrics storage with Prometheus-compatible query API.
# Runs in monolithic mode (-target=all) to keep resource use low for labs.
# ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: monitoring
data:
  mimir.yaml: |
    multitenancy_enabled: false

    server:
      http_listen_port: 8080

    distributor:
      ring:
        kvstore:
          store: inmemory
      pool:
        health_check_ingesters: true

    ingester:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1
      min_ready_duration: 0s
      final_sleep: 0s

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/tsdb
      tsdb:
        dir: /data/mimir/tsdb
      bucket_store:
        sync_dir: /data/mimir/tsdb-sync

    compactor:
      data_dir: /data/mimir/compactor

    ruler_storage:
      backend: local
      local:
        directory: /data/mimir/rules
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: monitoring
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:latest
          args:
            - -target=all
            - -config.file=/etc/mimir/mimir.yaml
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-service
  namespace: monitoring
  labels:
    app: mimir
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: mimir
